name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/backend:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/backend:cache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/frontend:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/frontend:cache,mode=max

      - name: Configure Backend secrets
        run: |
          az containerapp secret set \
            --name whatsai-backend \
            --resource-group whats-ai \
            --secrets \
              "azure-openai-endpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "azure-openai-key=${{ secrets.AZURE_OPENAI_KEY }}" \
              "azure-multiservice-key=${{ secrets.AZURE_MULTISERVICE_KEY }}" \
              "smtp-app-password=${{ secrets.SMTP_APP_PASSWORD }}" \
              "storage-connection-string=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Deploy Backend to Azure Container Apps
        run: |
          az containerapp update \
            --name whatsai-backend \
            --resource-group whats-ai \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest \
            --revision-suffix $(date +%Y%m%d%H%M%S) \
            --set-env-vars \
              "AZURE_OPENAI_ENDPOINT=secretref:azure-openai-endpoint" \
              "AZURE_OPENAI_KEY=secretref:azure-openai-key" \
              "AZURE_OPENAI_EMBEDDING_DEPLOYMENT=${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}" \
              "AZURE_OPENAI_CHAT_DEPLOYMENT=${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}" \
              "AZURE_MULTISERVICE_ENDPOINT=${{ secrets.AZURE_MULTISERVICE_ENDPOINT }}" \
              "AZURE_MULTISERVICE_KEY=secretref:azure-multiservice-key" \
              "SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}" \
              "SMTP_APP_PASSWORD=secretref:smtp-app-password" \
              "AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection-string"

      - name: Deploy Frontend to Azure Container Apps
        run: |
          az containerapp update \
            --name whatsai-frontend \
            --resource-group whats-ai \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest \
            --revision-suffix $(date +%Y%m%d%H%M%S)
